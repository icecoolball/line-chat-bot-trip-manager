name: Daily Trip Summary Cron
on:
  schedule:
    # ทุกวัน 9:00 น. เวลาไทย (UTC+7 = 02:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # กดรันเองได้เพื่อทดสอบ

jobs:
  trigger-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Summary API
        run: |
          curl -X POST https://YOUR_RAILWAY_APP_URL/api/daily-summary \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
