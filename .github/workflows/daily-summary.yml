name: Daily Trip Summary Manual Trigger

on:
  workflow_dispatch:

jobs:
  trigger-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Summary API
        run: |
          curl -X POST "${{ secrets.WORKER_BASE_URL }}/api/daily-summary" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"