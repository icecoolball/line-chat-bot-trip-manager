name: Showtime Check Manual Trigger

on:
  workflow_dispatch:

jobs:
  trigger-showtime-check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Showtime Check API
        run: |
          curl -X POST "${{ secrets.WORKER_BASE_URL }}/api/check-showtime" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"