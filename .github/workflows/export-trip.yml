name: Export Trip Excel

on:
  workflow_dispatch:
    inputs:
      export_job_id:
        description: Supabase export_jobs.id
        required: true
        type: string

jobs:
  export-trip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install supabase pandas openpyxl requests
      - name: Build and upload Excel
        env:
          EXPORT_JOB_ID: ${{ inputs.export_job_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python scripts/export_trip_job.py
